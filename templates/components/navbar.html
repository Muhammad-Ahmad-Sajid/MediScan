<!-- navbar.html -->
<header style="
    padding: 16px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    background: rgba(11, 20, 38, 0.5);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 40;
">
    <div>
        <h2 id="page-title" style="font-size:20px; font-weight:600; color:#F1F5F9; margin:0;">Dashboard</h2>
        <p id="page-breadcrumb" style="font-size:12px; color:#64748B; margin:4px 0 0;">
            <!-- Filled by page JS -->
        </p>
    </div>

    <div class="flex items-center gap-4">
        <!-- Search -->
        <div style="position:relative;">
            <input type="text" id="global-search" placeholder="Search patients..."
                style="background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:8px 16px 8px 36px; color:#F1F5F9; font-size:13px; width:220px; outline:none;"
                onfocus="this.style.borderColor='rgba(20,184,166,0.4)'; this.style.boxShadow='0 0 15px rgba(20,184,166,0.08)'"
                onblur="this.style.borderColor='rgba(255,255,255,0.08)'; this.style.boxShadow='none'">
            <svg style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#64748B;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
        </div>

        <!-- Notification bell -->
        <button style="position:relative; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); border-radius:10px; width:38px; height:38px; display:flex; align-items:center; justify-content:center; color:#94A3B8; cursor:pointer;"
            onmouseover="this.style.borderColor='rgba(20,184,166,0.3)'"
            onmouseout="this.style.borderColor='rgba(255,255,255,0.06)'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            <span id="notif-badge" class="hidden" style="position:absolute; top:6px; right:6px; width:8px; height:8px; background:#F87171; border-radius:50%; box-shadow: 0 0 8px rgba(248,113,113,0.5);"></span>
        </button>
    </div>
</header>
