<header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 sticky top-0 z-30">
    <div class="flex items-center">
        <button id="sidebar-toggle" class="text-slate-500 hover:text-teal-700 mr-4 focus:outline-none xl:block hidden">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <button id="mobile-menu-toggle" class="text-slate-500 hover:text-teal-700 mr-4 focus:outline-none xl:hidden block">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <h1 class="text-xl font-semibold text-slate-800" id="page-title">Dashboard</h1>
    </div>
    
    <div class="flex items-center space-x-4">
        <div class="relative hidden md:block">
            <svg class="w-5 h-5 text-slate-400 absolute left-3 top-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" id="global-search" placeholder="Search patients..." class="pl-10 pr-4 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 w-64">
        </div>
        <button class="text-slate-400 hover:text-teal-600 relative">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
        <div class="h-8 w-px bg-slate-200"></div>
        <span class="text-sm font-medium text-slate-700 hidden sm:block" id="nav-user-name">Loading...</span>
    </div>
</header>
<script>
    if(document.getElementById('mobile-menu-toggle')) {
        document.getElementById('mobile-menu-toggle').addEventListener('click', () => {
            const sidebar = document.getElementById('main-sidebar');
            if(sidebar.style.transform === 'translateX(0px)') {
                sidebar.style.transform = 'translateX(-100%)';
            } else {
                sidebar.style.transform = 'translateX(0px)';
            }
        });
    }
    
    // Auto-setup page title based on document.title
    const pt = document.getElementById('page-title');
    if (pt && document.title) {
        pt.textContent = document.title.replace('MediScan AI - ', '').replace('MediScan AI', 'Dashboard');
    }
</script>
