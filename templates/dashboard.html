<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan AI - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#CCFBF1', 400: '#14B8A6', 700: '#0F766E', 800: '#0D5E57' },
                        navy: '#1E3A5F',
                        surface: '#FFFFFF',
                        background: '#F8FAFC'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="bg-background text-slate-800 font-sans antialiased overflow-hidden">

    <div class="flex h-screen w-full">
        <!-- Sidebar injected via JS -->
        <div id="sidebar-container"></div>

        <!-- Main Content -->
        <div id="main-content-area" class="flex-1 flex flex-col main-content xl:ml-[250px] overflow-hidden">
            <!-- Navbar injected via JS -->
            <div id="navbar-container"></div>

            <!-- Page Content -->
            <main class="flex-1 overflow-y-auto p-6 md:p-8">
                
                <!-- Stats Row -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <!-- Stat 1 -->
                    <div class="bg-surface rounded-xl shadow-sm border border-slate-200 p-5 flex items-center">
                        <div class="w-12 h-12 rounded-full bg-teal-50 flex items-center justify-center mr-4">
                            <svg class="w-6 h-6 text-primary-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-slate-500">Total Scans Today</p>
                            <p class="text-2xl font-bold text-slate-800 stat-counter" data-target="0" id="stat-scans">0</p>
                        </div>
                    </div>
                    <!-- Stat 2 -->
                    <div class="bg-surface rounded-xl shadow-sm border border-slate-200 p-5 flex items-center">
                        <div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center mr-4">
                            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-slate-500">Total Patients</p>
                            <p class="text-2xl font-bold text-slate-800 stat-counter" data-target="0" id="stat-patients">0</p>
                        </div>
                    </div>
                    <!-- Stat 3 -->
                    <div class="bg-surface rounded-xl shadow-sm border border-slate-200 p-5 flex items-center">
                        <div class="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center mr-4">
                            <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-slate-500">Critical Alerts</p>
                            <p class="text-2xl font-bold text-slate-800 stat-counter" data-target="0" id="stat-alerts">0</p>
                        </div>
                    </div>
                    <!-- Stat 4 -->
                    <div class="bg-surface rounded-xl shadow-sm border border-slate-200 p-5 flex items-center">
                        <div class="w-12 h-12 rounded-full bg-indigo-50 flex items-center justify-center mr-4">
                            <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        </div>
                        <div>
                            <p class="text-sm font-medium text-slate-500">Reports Generated</p>
                            <p class="text-2xl font-bold text-slate-800 stat-counter" data-target="0" id="stat-reports">0</p>
                        </div>
                    </div>
                </div>

                <div class="mb-6 flex items-center justify-between">
                    <h2 class="text-lg font-bold text-slate-800">Diagnostic Modules</h2>
                    <p class="text-sm text-slate-500">Select a module to start a new scan</p>
                </div>

                <!-- 3x3 Module Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="module-grid">
                    <!-- Populated by dashboard.js -->
                </div>

            </main>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
