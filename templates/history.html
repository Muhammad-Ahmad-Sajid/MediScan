<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan AI - Patient History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#CCFBF1', 400: '#14B8A6', 700: '#0F766E', 800: '#0D5E57' },
                        navy: '#1E3A5F',
                        surface: '#FFFFFF',
                        background: '#F8FAFC'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-background text-slate-800 font-sans antialiased overflow-hidden">

    <div class="flex h-screen w-full relative">
        <div id="sidebar-container"></div>

        <div id="main-content-area" class="flex-1 flex flex-col main-content xl:ml-[250px] overflow-hidden">
            <div id="navbar-container"></div>

            <main class="flex-1 overflow-y-auto p-6 md:p-8">
                
                <!-- Patient Search -->
                <div class="bg-surface rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
                    <h2 class="text-lg font-bold text-slate-800 mb-4">Patient Search</h2>
                    <form id="patient-search-form" class="flex flex-col sm:flex-row gap-4">
                        <select id="patient-select" class="flex-1 px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-400 outline-none bg-white text-slate-700">
                            <option value="">-- Select or Type Patient Name/ID --</option>
                        </select>
                        <button type="submit" class="px-6 py-3 bg-primary-700 hover:bg-primary-800 text-white rounded-lg font-medium transition-colors shadow-sm whitespace-nowrap">
                            Load History
                        </button>
                    </form>
                </div>

                <!-- Patient Info Card -->
                <div id="patient-info-card" class="hidden bg-surface rounded-xl shadow-sm border border-slate-200 p-6 mb-8 flex items-center justify-between flex-wrap gap-4">
                    <div class="flex items-center">
                        <div class="w-16 h-16 rounded-full bg-slate-100 flex items-center justify-center text-xl font-bold text-slate-600 mr-4" id="pat-initials"></div>
                        <div>
                            <h3 class="text-xl font-bold text-slate-800" id="pat-name">Loading...</h3>
                            <p class="text-sm text-slate-500">ID: <span id="pat-id" class="font-medium"></span> &bull; Age: <span id="pat-age" class="font-medium"></span> &bull; <span id="pat-gender" class="font-medium"></span></p>
                        </div>
                    </div>
                    <div class="flex space-x-8 text-center bg-slate-50 p-3 rounded-lg border border-slate-100">
                        <div>
                            <p class="text-2xl font-bold text-primary-700" id="pat-total-scans">0</p>
                            <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Total Scans</p>
                        </div>
                        <div>
                            <p class="text-2xl font-bold text-slate-800" id="pat-last-scan">N/A</p>
                            <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Last Scan</p>
                        </div>
                    </div>
                </div>

                <!-- History Area -->
                <div id="history-area" class="hidden">
                    
                    <!-- Tabs & Controls -->
                    <div class="flex flex-col xl:flex-row items-center justify-between mb-6 gap-4">
                        <div class="w-full xl:w-auto overflow-x-auto pb-2 xl:pb-0 hide-scrollbar flex-1">
                            <div class="flex space-x-2" id="module-tabs">
                                <!-- Populated via JS -->
                            </div>
                        </div>
                        <div class="flex items-center space-x-2 bg-slate-100 p-1 rounded-lg shrink-0">
                            <button id="view-list" class="p-2 rounded bg-white shadow-sm text-slate-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
                            <button id="view-grid" class="p-2 rounded text-slate-500 hover:text-slate-800"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg></button>
                        </div>
                    </div>

                    <!-- Scans Container -->
                    <div id="scans-container" class="space-y-4">
                        <!-- Populated via JS (List mode default) -->
                    </div>

                    <div id="empty-state" class="hidden text-center py-16 bg-surface rounded-xl border border-slate-200 border-dashed">
                        <svg class="w-16 h-16 text-slate-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        <h3 class="text-lg font-medium text-slate-800">No Scans Found</h3>
                        <p class="text-sm text-slate-500 mt-1">This patient has no scan history for the selected module.</p>
                    </div>

                </div>

            </main>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4 cursor-pointer" onclick="this.classList.add('hidden')">
        <img id="lightbox-img" src="" class="max-h-full max-w-full rounded shadow-2xl cursor-default" onclick="event.stopPropagation()">
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/history.js"></script>
</body>
</html>
