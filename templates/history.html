<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan AI — Scan History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#CCFBF1', 100: '#B2F5EA', 400: '#14B8A6', 600: '#0D9488', 700: '#0F766E', 800: '#0D5E57' },
                        navy: { DEFAULT: '#0B1426', light: '#132040', medium: '#1A2D50' },
                        cyan: { glow: '#22D3EE' },
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .history-tab {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            color: #94A3B8;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.06);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .history-tab.active {
            background: rgba(20,184,166,0.1);
            color: #14B8A6;
            border-color: rgba(20,184,166,0.3);
            box-shadow: 0 0 10px rgba(20,184,166,0.1);
        }
        .history-tab:hover:not(.active) {
            background: rgba(255,255,255,0.04);
            color: #F1F5F9;
        }
        
        /* Hide scrollbar for tabs */
        .tabs-container::-webkit-scrollbar { display: none; }
        .tabs-container { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body style="background: #0B1426; margin: 0; min-height: 100vh; color: #F1F5F9;">

    <!-- PARTICLE BACKGROUND -->
    <div id="particle-bg" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none;"></div>

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- MAIN WRAPPER -->
    <div class="page-content-wrapper" style="margin-left:260px; position:relative; z-index:1; transition: margin-left 0.3s ease;">

        <!-- NAVBAR -->
        <div id="navbar-container"></div>

        <!-- PAGE CONTENT -->
        <div class="page-content" style="padding: 32px 40px; max-width: 1200px; margin: 0 auto;">
            
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h2 style="font-size:22px; font-weight:700; color:#F1F5F9; margin:0;">Scan History</h2>
                    <p style="font-size:13px; color:#64748B; margin:4px 0 0;">Review past diagnostics and patient records</p>
                </div>

                <div style="position:relative;">
                    <input type="text" id="filter-search" placeholder="Search ID or Name..."
                        class="glass-input pl-10" style="width: 260px;">
                    <svg style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#64748B;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </div>
            </div>

            <!-- Horizontal Module Tabs -->
            <div class="tabs-container flex gap-3 overflow-x-auto pb-2 mb-6" id="module-tabs">
                <button class="history-tab active" data-module="all">All Scans</button>
                <button class="history-tab" data-module="fracture">Bone Fracture</button>
                <button class="history-tab" data-module="arthritis">Arthritis</button>
                <button class="history-tab" data-module="osteoporosis">Osteoporosis</button>
                <button class="history-tab" data-module="tb">TB Screening</button>
                <button class="history-tab" data-module="lung_nodule">Lung Nodule</button>
                <button class="history-tab" data-module="brain_tumor">Brain Tumor</button>
                <button class="history-tab" data-module="brain_hemorrhage">Brain Hemorrhage</button>
                <button class="history-tab" data-module="bone_age">Bone Age</button>
                <button class="history-tab" data-module="retinopathy">Retinopathy</button>
            </div>

            <!-- Scans Grid -->
            <div id="scans-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                <!-- Loader -->
                <div class="col-span-full py-12 flex justify-center">
                    <div style="width:32px; height:32px; border:3px solid rgba(20,184,166,0.2); border-top-color:#14B8A6; border-radius:50%; animation:spin 1s linear infinite;"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Patient Details Modal (If clicked on patient info inside a scan card) -->
    <div id="patient-modal" class="hidden" style="position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center;">
        <div class="glass-strong" style="padding:32px; border-radius:20px; max-width:440px; width:90%; border:1px solid rgba(255,255,255,0.1);" id="patient-modal-card">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 style="font-size:20px; font-weight:700; color:#F1F5F9; margin:0 0 4px;" id="modal-patient-name">Patient Name</h3>
                    <p style="font-size:13px; color:#64748B; margin:0;" id="modal-patient-details">ID: ...</p>
                </div>
                <button onclick="closePatientModal()" style="color:#94A3B8; background:none; border:none; cursor:pointer; font-size:24px;">&times;</button>
            </div>
            
            <div style="background:rgba(255,255,255,0.03); border-radius:12px; padding:16px; margin-bottom:20px;">
                <div class="grid grid-cols-2 gap-4">
                    <div><span style="font-size:12px; color:#64748B;">Age</span><div style="color:#F1F5F9; font-size:14px; font-weight:500;" id="modal-age">--</div></div>
                    <div><span style="font-size:12px; color:#64748B;">Gender</span><div style="color:#F1F5F9; font-size:14px; font-weight:500;" id="modal-gender">--</div></div>
                    <div class="col-span-2"><span style="font-size:12px; color:#64748B;">Comorbidities</span><div style="color:#F1F5F9; font-size:14px; font-weight:500;" id="modal-comorbidities">None</div></div>
                </div>
            </div>

            <button onclick="closePatientModal()" style="width:100%; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.04); color:#94A3B8; cursor:pointer;">
                Close
            </button>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/three-scenes.js"></script>
    <script src="/static/js/history.js"></script>
</body>
</html>
