<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan AI — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <!-- Tailwind config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#CCFBF1', 100: '#B2F5EA', 400: '#14B8A6', 600: '#0D9488', 700: '#0F766E', 800: '#0D5E57' },
                        navy: { DEFAULT: '#0B1426', light: '#132040', medium: '#1A2D50' },
                        cyan: { glow: '#22D3EE' },
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="overflow-hidden" style="background: #0B1426; margin: 0; font-family: 'Inter', sans-serif;">
    <!-- THREE.JS CANVAS (fullscreen background) -->
    <div id="three-container" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0;"></div>

    <!-- Left side branding (over the 3D scene) -->
    <div id="left-branding" style="position:fixed; z-index:5; top:50%; left:80px; transform:translateY(-50%); pointer-events:none;">
        <h1 style="font-size:48px; font-weight:800; color:#F1F5F9; text-shadow: 0 0 60px rgba(20,184,166,0.3); letter-spacing:-1px; margin:0;">
            MediScan AI
        </h1>
        <p style="font-size:18px; color:#94A3B8; margin-top:8px; max-width:350px; line-height:1.6;">
            Multi-Specialty Medical Imaging Intelligence Platform
        </p>
        <div style="margin-top:24px; display:flex; gap:16px; flex-wrap:wrap;">
            <span style="font-size:12px; color:#14B8A6; background:rgba(20,184,166,0.1); padding:6px 14px; border-radius:20px; border:1px solid rgba(20,184,166,0.2);">
                9 AI Modules
            </span>
            <span style="font-size:12px; color:#14B8A6; background:rgba(20,184,166,0.1); padding:6px 14px; border-radius:20px; border:1px solid rgba(20,184,166,0.2);">
                7 Specialties
            </span>
            <span style="font-size:12px; color:#14B8A6; background:rgba(20,184,166,0.1); padding:6px 14px; border-radius:20px; border:1px solid rgba(20,184,166,0.2);">
                Explainable AI
            </span>
        </div>
    </div>

    <!-- LOGIN CARD (overlaid on canvas) -->
    <div id="login-overlay" style="position:relative; z-index:10; width:100%; height:100vh; display:flex; align-items:center; justify-content:flex-end; padding-right: 80px;">
        <div id="login-card" class="login-3d-card">
            <!-- Holographic sweep overlay -->
            <div class="holo-sweep"></div>

            <!-- Content (z-index above sweep) -->
            <div style="position:relative; z-index:2;">

                <!-- Logo — glowing medical cross + heartbeat -->
                <div class="flex justify-center mb-6">
                    <div class="relative">
                        <svg width="64" height="64" viewBox="0 0 64 64" class="drop-shadow-[0_0_20px_rgba(20,184,166,0.5)]">
                            <!-- Glowing circle -->
                            <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(20,184,166,0.3)" stroke-width="1.5"/>
                            <!-- Heartbeat line -->
                            <polyline points="12,32 22,32 26,20 30,44 34,28 38,36 42,32 52,32"
                                      fill="none" stroke="#14B8A6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <!-- Pulsing glow behind logo -->
                        <div class="absolute inset-0 rounded-full animate-ping opacity-20" style="background: radial-gradient(circle, rgba(20,184,166,0.4), transparent 70%);"></div>
                    </div>
                </div>

                <!-- Title -->
                <h1 class="text-2xl font-bold text-center mb-1" style="color: #F1F5F9; text-shadow: 0 0 30px rgba(20,184,166,0.2);">
                    Welcome Back
                </h1>
                <p class="text-center text-sm mb-8" style="color: #64748B;">
                    Sign in to MediScan AI
                </p>

                <!-- Email Input -->
                <div class="mb-5">
                    <label class="block text-xs font-semibold mb-2 tracking-wider" style="color: #94A3B8;">EMAIL</label>
                    <div class="relative">
                        <input type="email" id="login-email" placeholder="Enter your email"
                            class="w-full px-4 py-3 rounded-xl text-sm outline-none placeholder-slate-400"
                            style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #F1F5F9; transition: border-color 0.3s, box-shadow 0.3s;"
                            onfocus="this.style.borderColor='rgba(20,184,166,0.5)'; this.style.boxShadow='0 0 20px rgba(20,184,166,0.1)'"
                            onblur="this.style.borderColor='rgba(255,255,255,0.2)'; this.style.boxShadow='none'">
                    </div>
                </div>

                <!-- Password Input -->
                <div class="mb-6">
                    <label class="block text-xs font-semibold mb-2 tracking-wider" style="color: #94A3B8;">PASSWORD</label>
                    <div class="relative">
                        <input type="password" id="login-password" placeholder="Enter your password"
                            class="w-full px-4 py-3 rounded-xl text-sm outline-none placeholder-slate-400"
                            style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #F1F5F9; transition: border-color 0.3s, box-shadow 0.3s;"
                            onfocus="this.style.borderColor='rgba(20,184,166,0.5)'; this.style.boxShadow='0 0 20px rgba(20,184,166,0.1)'"
                            onblur="this.style.borderColor='rgba(255,255,255,0.2)'; this.style.boxShadow='none'">
                        <!-- Eye toggle -->
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2"
                            style="color: #64748B; background:none; border:none; cursor:pointer;">
                            <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Sign In Button -->
                <button id="login-btn" onclick="handleLogin()"
                    class="w-full py-3.5 rounded-xl font-semibold text-sm"
                    style="background: linear-gradient(135deg, #0F766E, #22D3EE); color: white; box-shadow: 0 0 30px rgba(20,184,166,0.2); transition: transform 0.3s, box-shadow 0.3s;"
                    onmouseover="this.style.boxShadow='0 0 50px rgba(20,184,166,0.35)'; this.style.transform='translateY(-1px)'"
                    onmouseout="this.style.boxShadow='0 0 30px rgba(20,184,166,0.2)'; this.style.transform='translateY(0)'">
                    Sign In
                </button>

                <!-- Error message -->
                <div id="login-error" class="hidden mt-4 text-center text-sm" style="color: #F87171;"></div>

                <!-- Register link -->
                <p class="text-center mt-6 text-sm" style="color: #64748B;">
                    Don't have an account?
                    <a href="#" onclick="showRegister()" style="color: #14B8A6; font-weight: 600;" class="hover:underline">Register</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast container for notifications -->
    <div id="toast-container"></div>

    <script src="/static/js/app.js"></script> <!-- Included for showToast -->
    <script src="/static/js/login.js"></script>
</body>
</html>
