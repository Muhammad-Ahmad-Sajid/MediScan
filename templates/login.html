<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan AI - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#CCFBF1', 400: '#14B8A6', 700: '#0F766E', 800: '#0D5E57' },
                        navy: '#1E3A5F',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .login-bg {
            background: linear-gradient(135deg, #1E3A5F 0%, #0F766E 100%);
        }
        .form-view {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden relative min-h-[500px]">
        
        <!-- Header -->
        <div class="pt-8 pb-4 px-8 text-center bg-slate-50 border-b border-slate-100">
            <div class="flex justify-center mb-3">
                <img src="/static/img/logo.svg" alt="MediScan AI" class="w-12 h-12">
            </div>
            <h1 class="text-2xl font-bold text-navy">MediScan AI</h1>
            <p class="text-sm text-slate-500 mt-1">Multi-Specialty Medical Imaging Intelligence</p>
        </div>

        <div class="relative w-full h-[400px] overflow-hidden">
            
            <!-- Login Form -->
            <div id="login-view" class="form-view absolute top-0 left-0 w-full h-full p-8 bg-white transition-transform duration-300">
                <h2 class="text-xl font-semibold text-slate-800 mb-6 text-center">Sign In</h2>
                <form id="login-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-slate-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            </span>
                            <input type="email" id="login-email" required class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-400 focus:border-primary-400 outline-none transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-slate-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            </span>
                            <input type="password" id="login-password" required class="w-full pl-10 pr-10 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-400 focus:border-primary-400 outline-none transition-all">
                            <button type="button" onclick="togglePwd('login-password')" class="absolute right-3 top-3 text-slate-400 hover:text-slate-600 focus:outline-none">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-primary-700 hover:bg-primary-800 text-white font-semibold py-2.5 rounded-lg shadow-md hover:shadow-lg transition-all mt-4">Sign In</button>
                </form>
                <div class="mt-6 text-center">
                    <p class="text-sm text-slate-500">Don't have an account? <button onclick="toggleAuthView('register')" class="text-primary-700 font-semibold hover:underline">Register</button></p>
                </div>
            </div>

            <!-- Register Form -->
            <div id="register-view" class="form-view absolute top-0 left-full w-full h-full p-8 bg-white transition-transform duration-300 overflow-y-auto">
                <h2 class="text-xl font-semibold text-slate-800 mb-4 text-center">Create Account</h2>
                <form id="register-form" class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1">Full Name</label>
                        <input type="text" id="reg-name" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-400 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1">Email</label>
                        <input type="email" id="reg-email" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-400 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1">Role</label>
                        <select id="reg-role" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-400 outline-none text-sm bg-white">
                            <option value="doctor">Doctor</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-700 mb-1">Password</label>
                        <input type="password" id="reg-password" required minlength="6" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-400 outline-none text-sm">
                    </div>
                    <button type="submit" class="w-full bg-primary-700 hover:bg-primary-800 text-white font-semibold py-2.5 rounded-lg shadow-md hover:shadow-lg transition-all mt-2 text-sm">Create Account</button>
                </form>
                <div class="mt-4 text-center">
                    <p class="text-sm text-slate-500">Already have an account? <button onclick="toggleAuthView('login')" class="text-primary-700 font-semibold hover:underline">Sign In</button></p>
                </div>
            </div>

        </div>
    </div>

    <script src="/static/js/app.js?v=1.1"></script>
    <script src="/static/js/login.js?v=1.1"></script>
</body>
</html>
