<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan AI — Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#CCFBF1', 100: '#B2F5EA', 400: '#14B8A6', 600: '#0D9488', 700: '#0F766E', 800: '#0D5E57' },
                        navy: { DEFAULT: '#0B1426', light: '#132040', medium: '#1A2D50' },
                        cyan: { glow: '#22D3EE' },
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body style="background: #0B1426; margin: 0; min-height: 100vh; color: #F1F5F9;">

    <!-- PARTICLE BACKGROUND -->
    <div id="particle-bg" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none;"></div>

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- MAIN WRAPPER -->
    <div class="page-content-wrapper" style="margin-left:260px; position:relative; z-index:1; transition: margin-left 0.3s ease;">

        <!-- NAVBAR -->
        <div id="navbar-container"></div>

        <!-- PAGE CONTENT -->
        <div class="page-content" style="padding: 32px 40px; max-width: 1200px; margin: 0 auto;">
            
            <div class="grid gap-6 lg:grid-cols-[1.4fr_1fr]">

                <!-- LEFT: Image Comparison -->
                <div class="glass" style="padding:28px; border-radius:16px;">
                    <!-- Tab Toggle -->
                    <div class="flex gap-2 mb-5">
                        <button class="img-tab active" data-view="original" onclick="switchImageTab('original')"
                            style="padding:8px 18px; border-radius:10px; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; border:1px solid rgba(20,184,166,0.3); background:rgba(20,184,166,0.1); color:#14B8A6;">
                            Original
                        </button>
                        <button class="img-tab" data-view="heatmap" onclick="switchImageTab('heatmap')"
                            style="padding:8px 18px; border-radius:10px; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; border:1px solid rgba(255,255,255,0.06); background:transparent; color:#94A3B8;">
                            Grad-CAM
                        </button>
                        <button class="img-tab hidden" data-view="split" onclick="switchImageTab('split')"
                            style="padding:8px 18px; border-radius:10px; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; border:1px solid rgba(255,255,255,0.06); background:transparent; color:#94A3B8;">
                            Side by Side
                        </button>
                    </div>

                    <!-- Image Display -->
                    <div id="image-display" style="border-radius:12px; overflow:hidden; background:rgba(0,0,0,0.3); min-height:450px; display:flex; align-items:center; justify-content:center;">
                        <img id="result-image" src="" style="max-width:100%; max-height:550px; cursor:zoom-in;" onclick="openLightbox(this.src)">
                    </div>

                    <p style="font-size:12px; color:#4A5568; margin:12px 0 0; text-align:center;">
                        <span id="scan-date"></span>
                    </p>
                </div>

                <!-- RIGHT: Diagnosis Panel -->
                <div>
                    <!-- Diagnosis Badge -->
                    <div id="diagnosis-card" class="glass" style="padding:28px; border-radius:16px; margin-bottom:16px; text-align:center;">
                        <div id="diagnosis-badge" style="padding:16px; border-radius:14px; margin-bottom:20px; font-size:18px; font-weight:700; letter-spacing:1px; opacity:0; transform:scale(0.8);">
                            <!-- Filled by JS -->
                        </div>

                        <!-- Confidence -->
                        <div style="margin-bottom:8px;">
                            <div class="flex justify-between items-end mb-2">
                                <span style="font-size:12px; color:#64748B; text-transform:uppercase; letter-spacing:1px;">Confidence</span>
                                <span id="confidence-value" style="font-size:28px; font-weight:700; color:#F1F5F9;">0%</span>
                            </div>
                            <div class="confidence-bar" style="height:6px; background:rgba(255,255,255,0.05); border-radius:3px; overflow:hidden;">
                                <div id="confidence-fill" style="height:100%; width:0%; background:linear-gradient(90deg, #14B8A6, #22D3EE); border-radius:3px; box-shadow:0 0 10px rgba(20,184,166,0.5);"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Clinical Recommendation -->
                    <div id="recommendation-card" class="glass" style="padding:24px; border-radius:16px; margin-bottom:16px; position:relative; overflow:hidden;">
                        <div style="position:absolute; left:0; top:0; bottom:0; width:3px; background:#14B8A6;"></div>
                        <div style="padding-left:12px;">
                            <h4 style="font-size:13px; color:#64748B; text-transform:uppercase; letter-spacing:1px; margin:0 0 10px;">Clinical Recommendation</h4>
                            <p id="recommendation-text" style="font-size:14px; color:#CBD5E1; line-height:1.6; margin:0;">Loading...</p>
                        </div>
                    </div>

                    <!-- Additional details container (dynamically injected by JS based on module) -->
                    <div id="module-specific-details"></div>

                    <!-- Action Buttons -->
                    <div class="flex gap-3 flex-wrap mt-4">
                        <button onclick="downloadReport()" style="flex:1; padding:12px; border-radius:12px; font-size:13px; font-weight:600; color:white; border:none; cursor:pointer; background:linear-gradient(135deg, #0F766E, #22D3EE); box-shadow:0 0 20px rgba(20,184,166,0.15);">
                            Download Report
                        </button>
                        <button onclick="showOverrideModal()" style="flex:1; padding:12px; border-radius:12px; font-size:13px; font-weight:500; color:#94A3B8; border:1px solid rgba(255,255,255,0.08); background:transparent; cursor:pointer;"
                            onmouseover="this.style.borderColor='rgba(20,184,166,0.3)'"
                            onmouseout="this.style.borderColor='rgba(255,255,255,0.08)'">
                            Clinician Override
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Override Modal -->
    <div id="override-modal" style="display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.7); backdrop-filter:blur(6px); align-items:center; justify-content:center;">
        <div class="glass-strong" style="padding:32px; border-radius:20px; max-width:440px; width:90%; border:1px solid rgba(255,255,255,0.1);">
            <h3 style="font-size:18px; font-weight:600; color:#F1F5F9; margin:0 0 20px;">Clinician Override</h3>

            <div class="mb-4">
                <label style="font-size:12px; color:#94A3B8; display:block; margin-bottom:6px;">Override Diagnosis</label>
                <select id="override-diagnosis" class="glass-input w-full"></select>
            </div>

            <div class="mb-6">
                <label style="font-size:12px; color:#94A3B8; display:block; margin-bottom:6px;">Clinical Notes</label>
                <textarea id="override-notes" rows="3" class="glass-input w-full" placeholder="Reason for override..." style="resize:none;"></textarea>
            </div>

            <div class="flex gap-3">
                <button onclick="submitOverride()" style="flex:1; padding:12px; border-radius:10px; background:linear-gradient(135deg, #0F766E, #22D3EE); color:white; font-weight:600; border:none; cursor:pointer;">
                    Confirm Override
                </button>
                <button onclick="closeOverrideModal()" style="flex:1; padding:12px; border-radius:10px; border:1px solid rgba(255,255,255,0.08); background:transparent; color:#94A3B8; cursor:pointer;">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" style="display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.9); backdrop-filter:blur(8px); align-items:center; justify-content:center;" onclick="closeLightbox()">
        <img id="lightbox-img" src="" style="max-width:90%; max-height:90%; border-radius:8px; border:1px solid rgba(255,255,255,0.1);" onclick="event.stopPropagation()">
        <button onclick="closeLightbox()" style="position:absolute; top:24px; right:32px; color:white; font-size:36px; background:none; border:none; cursor:pointer;">&times;</button>
    </div>

    <div id="toast-container"></div>

    <script>
        window.MODULE_NAME = "{{ module }}";
        window.SCAN_ID = "{{ scan_id }}";
    </script>
    <script src="/static/js/app.js"></script>
    <script src="/static/js/three-scenes.js"></script>
    <script src="/static/js/results.js"></script>
</body>
</html>
